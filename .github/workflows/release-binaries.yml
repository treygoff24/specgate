name: release-binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example v1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          binary_path="target/${{ matrix.target }}/release/specgate"
          archive_name="specgate-${TAG}-${{ matrix.target }}.tar.gz"

          if [ ! -f "$binary_path" ]; then
            echo "Missing binary: $binary_path" >&2
            exit 1
          fi

          tar -czf "dist/$archive_name" -C "target/${{ matrix.target }}/release" specgate

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/$archive_name" > "dist/$archive_name.sha256"
          else
            shasum -a 256 "dist/$archive_name" > "dist/$archive_name.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: specgate-${{ matrix.target }}
          path: dist/

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: specgate-*
          path: dist/
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/specgate-*.tar.gz
            dist/specgate-*.sha256
