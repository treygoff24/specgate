name: release-binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example v1.2.3)'
        required: true

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  gate:
    name: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Validate tag and Cargo version
        run: |
          set -euo pipefail

          if [[ ! "${TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Invalid tag format: ${TAG}" >&2
            exit 1
          fi

          cargo_version="$(awk -F= '/^[[:space:]]*version[[:space:]]*=/{ gsub(/[[:space:]]/, "", $2); gsub(/"/, "", $2); print $2; exit }' Cargo.toml)"
          if [[ -z "${cargo_version}" ]]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi

          base_tag="${TAG%%[-+]*}"
          if [[ "v${cargo_version}" != "${base_tag}" ]]; then
            echo "Tag ${TAG} does not match Cargo.toml version v${cargo_version}" >&2
            exit 1
          fi

      - name: Run release gate script
        run: scripts/ci/mvp_gate.sh

  build:
    name: build-${{ matrix.target }}
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Smoke check built binary
        run: target/${{ matrix.target }}/release/specgate --version

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          binary_path="target/${{ matrix.target }}/release/specgate"
          archive_name="specgate-${TAG}-${{ matrix.target }}.tar.gz"

          if [ ! -f "$binary_path" ]; then
            echo "Missing binary: $binary_path" >&2
            exit 1
          fi

          tar -czf "dist/$archive_name" -C "target/${{ matrix.target }}/release" specgate

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/$archive_name" > "dist/$archive_name.sha256"
          else
            shasum -a 256 "dist/$archive_name" > "dist/$archive_name.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: specgate-${{ matrix.target }}
          path: dist/

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: specgate-*
          path: dist/
          merge-multiple: true

      - name: Validate release artifacts
        run: |
          set -euo pipefail
          declare -a required_assets=(
            "specgate-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
            "specgate-${TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256"
            "specgate-${TAG}-x86_64-apple-darwin.tar.gz"
            "specgate-${TAG}-x86_64-apple-darwin.tar.gz.sha256"
            "specgate-${TAG}-aarch64-apple-darwin.tar.gz"
            "specgate-${TAG}-aarch64-apple-darwin.tar.gz.sha256"
          )

          for asset in "${required_assets[@]}"; do
            if [[ ! -f "dist/$asset" ]]; then
              echo "Missing release artifact: $asset" >&2
              ls -la dist/
              exit 1
            fi
          done

      - name: Classify release channel
        id: release_channel
        shell: bash
        run: |
          set -euo pipefail
          base="${TAG%%+*}"
          if [[ "${base}" == *-* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_dist_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          make_latest: ${{ steps.release_channel.outputs.channel == 'stable' && 'true' || 'false' }}
          files: |
            dist/specgate-*.tar.gz
            dist/specgate-*.sha256

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "### release-binaries summary"
            echo "- tag: \`${TAG}\`"
            echo "- channel: \`${{ steps.release_channel.outputs.channel }}\`"
            echo "- npm wrapper dist-tag target: \`${{ steps.release_channel.outputs.npm_dist_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
