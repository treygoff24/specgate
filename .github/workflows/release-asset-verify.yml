name: Verify release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify (for example, v1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-release-assets:
    name: Verify release assets for ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: x86_64-apple-darwin
            runs-on: macos-15-intel
          - target: aarch64-apple-darwin
            runs-on: macos-14

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download, verify, and smoke test
        env:
          TAG_NAME: ${{ steps.release_tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          curl_with_retries() {
            curl --fail-with-body \
              --location \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 5 \
              --retry-max-time 120 \
              --connect-timeout 10 \
              --max-time 300 \
              "$@"
          }

          release_api_url="https://api.github.com/repos/${REPO}/releases/tags/${TAG_NAME}"
          release_status="$(curl --silent --show-error --location \
            --write-out "%{http_code}" \
            --output /tmp/release.json \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$release_api_url")"

          if [ "$release_status" = "404" ]; then
            echo "Release tag ${TAG_NAME} is not published yet. Run release-binaries to publish assets first."
            exit 1
          fi

          if [ "$release_status" != "200" ]; then
            echo "Failed to resolve release metadata for ${TAG_NAME} (HTTP ${release_status})."
            cat /tmp/release.json
            exit 1
          fi

          TARBALL_NAME="$(jq -r --arg target "$TARGET" '[.assets[] | select(.name | endswith(".tar.gz")) | select(.name | contains($target))][0].name // empty' /tmp/release.json)"
          SHA_NAME="$(jq -r --arg target "$TARGET" '[.assets[] | select(.name | endswith(".sha256")) | select(.name | contains($target))][0].name // empty' /tmp/release.json)"

          if [ -z "$TARBALL_NAME" ] || [ -z "$SHA_NAME" ]; then
            echo "Missing expected assets for target ${TARGET} at tag ${TAG_NAME}."
            exit 1
          fi

          TARBALL_ASSET_URL="$(jq -r --arg name "$TARBALL_NAME" '.assets[] | select(.name == $name) | .url' /tmp/release.json)"
          SHA_ASSET_URL="$(jq -r --arg name "$SHA_NAME" '.assets[] | select(.name == $name) | .url' /tmp/release.json)"

          if [ -z "$TARBALL_ASSET_URL" ] || [ -z "$SHA_ASSET_URL" ]; then
            echo "Unable to resolve release asset download URLs for target ${TARGET}."
            exit 1
          fi

          WORKDIR="${RUNNER_TEMP}/specgate-${TAG_NAME}-${TARGET}"
          mkdir -p "$WORKDIR"
          TARBALL_PATH="${WORKDIR}/${TARBALL_NAME}"
          SHA_PATH="${WORKDIR}/${SHA_NAME}"

          curl_with_retries \
            --header "Accept: application/octet-stream" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$TARBALL_PATH" \
            "$TARBALL_ASSET_URL"

          curl_with_retries \
            --header "Accept: application/octet-stream" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$SHA_PATH" \
            "$SHA_ASSET_URL"

          cd "$WORKDIR"
          if command -v sha256sum >/dev/null; then
            sha256sum --check "$SHA_NAME"
          else
            shasum -a 256 --check "$SHA_NAME"
          fi

          mkdir -p extracted
          tar -xzf "$TARBALL_NAME" -C extracted

          BINARY_PATH="$(find extracted -type f -name specgate -print -quit)"
          if [ -z "$BINARY_PATH" ]; then
            echo "Could not locate specgate binary in ${TARBALL_NAME}."
            exit 1
          fi

          chmod +x "$BINARY_PATH"
          VERSION_OUTPUT="$($BINARY_PATH --version)"

          echo "Smoke check passed for ${TARGET}: ${VERSION_OUTPUT}"
