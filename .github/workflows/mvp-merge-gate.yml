name: MVP Merge Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  mvp-merge-gate:
    name: mvp-merge-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Specgate MVP gate
        run: ./scripts/ci/mvp_gate.sh
