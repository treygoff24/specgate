name: perf-tier1

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  perf-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Defaults are authoritative in perf_budget.sh.
    # Set repo-level variables (Settings > Variables) to override.
    env:
      SPECGATE_PERF_MODULES: ${{ vars.SPECGATE_PERF_MODULES }}
      SPECGATE_PERF_FILES_PER_MODULE: ${{ vars.SPECGATE_PERF_FILES_PER_MODULE }}
      SPECGATE_PERF_BUDGET_MS: ${{ vars.SPECGATE_PERF_BUDGET_MS }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "perf-tier1"
          cache-targets: false

      - name: Perf budget gate
        run: scripts/ci/perf_budget.sh
