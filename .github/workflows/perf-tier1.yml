name: perf-tier1

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  perf-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SPECGATE_PERF_MODULES: "120"
      SPECGATE_PERF_FILES_PER_MODULE: "4"
      SPECGATE_PERF_BUDGET_MS: "7000"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - name: Perf budget gate
        run: scripts/ci/perf_budget.sh
