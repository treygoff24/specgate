name: Specgate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  specgate:
    name: Specgate Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - name: Install Specgate (prefer release binary with checksum, fallback to cargo install)
        run: |
          set -euo pipefail
          SPECGATE_TAG="vX.Y.Z"
          SPECGATE_TARGET="x86_64-unknown-linux-gnu"
          SPECGATE_ARCHIVE="specgate-${SPECGATE_TAG}-${SPECGATE_TARGET}.tar.gz"
          SPECGATE_BASE_URL="https://github.com/treygoff24/specgate/releases/download/${SPECGATE_TAG}"
          WORKDIR="${RUNNER_TEMP}/specgate-install"
          SPECGATE_CURL_OPTS=(--fail --show-error --location --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 120)

          mkdir -p "$WORKDIR"
          if \
            curl "${SPECGATE_CURL_OPTS[@]}" "${SPECGATE_BASE_URL}/${SPECGATE_ARCHIVE}" -o "${WORKDIR}/${SPECGATE_ARCHIVE}" && \
            curl "${SPECGATE_CURL_OPTS[@]}" "${SPECGATE_BASE_URL}/${SPECGATE_ARCHIVE}.sha256" -o "${WORKDIR}/${SPECGATE_ARCHIVE}.sha256" && \
            (cd "$WORKDIR" && sha256sum -c "${SPECGATE_ARCHIVE}.sha256"); then
            tar -xzf "${WORKDIR}/${SPECGATE_ARCHIVE}" -C "$WORKDIR"
            if [ ! -f "${WORKDIR}/specgate" ]; then
              echo "::error::Prebuilt release archive missing expected specgate binary."
              exit 1
            fi
            chmod +x "${WORKDIR}/specgate"
            if [ ! -x "${WORKDIR}/specgate" ]; then
              echo "::error::Prebuilt release binary is not executable."
              exit 1
            fi
            echo "${WORKDIR}" >> "$GITHUB_PATH"
            echo "Installed prebuilt specgate ${SPECGATE_TAG} from release assets"
          else
            echo "::warning::Prebuilt release asset unavailable or checksum validation failed. Falling back to cargo install."
            CARGO_ROOT="${WORKDIR}/cargo-root"
            cargo install --locked --git https://github.com/treygoff24/specgate --tag "$SPECGATE_TAG" --root "$CARGO_ROOT" --force
            if [ ! -x "${CARGO_ROOT}/bin/specgate" ]; then
              echo "::error::cargo install did not produce an executable at ${CARGO_ROOT}/bin/specgate."
              exit 1
            fi
            echo "${CARGO_ROOT}/bin" >> "$GITHUB_PATH"
          fi

      - name: Run Specgate check
        id: check
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          verdict_path="${{ github.workspace }}/.specgate-verdict.json"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            specgate check --since origin/main --output-mode deterministic | tee "$verdict_path"
          else
            specgate check --output-mode deterministic | tee "$verdict_path"
          fi

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Detect policy widenings
        id: policy
        if: github.event_name == 'pull_request'
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          policy_report_path="${{ github.workspace }}/.specgate-policy-diff.json"

          # You can enforce this check in-band with:
          # specgate check --since origin/main --deny-widenings
          specgate policy-diff --base origin/main --format json | tee "$policy_report_path"

          policy_exit_code=${PIPESTATUS[0]}
          echo "exit_code=$policy_exit_code" >> "$GITHUB_OUTPUT"
          exit "$policy_exit_code"

      - name: Upload policy diff artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: specgate-policy-diff
          path: ${{ github.workspace }}/.specgate-policy-diff.json
          if-no-files-found: warn

      - name: Render Specgate SARIF
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          sarif_path="${{ github.workspace }}/specgate.sarif"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            specgate check --since origin/main --format sarif > "$sarif_path"
          else
            specgate check --format sarif > "$sarif_path"
          fi

      - name: Upload Specgate SARIF
        if: always() && hashFiles('specgate.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ github.workspace }}/specgate.sarif

      - name: Upload Specgate verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specgate-verdict
          path: ${{ github.workspace }}/.specgate-verdict.json
          if-no-files-found: warn

      - name: Summarize Specgate telemetry
        if: always()
        run: |
          {
            echo "## Specgate Telemetry"
            echo ""
            if [ -f "${{ github.workspace }}/.specgate-verdict.json" ]; then
              python -c "import json,sys; v=json.load(open(sys.argv[1],'r',encoding='utf-8')); s=v.get('summary',{}); m=v.get('metrics',{}); print(f'- new_error_violations: {s.get(\"new_error_violations\", 0)}'); print(f'- baseline_violations: {s.get(\"baseline_violations\", 0)}'); print(f'- stale_baseline_entries: {s.get(\"stale_baseline_entries\", 0)}'); print(f'- metrics.total_ms: {m.get(\"total_ms\", \"n/a\")}')" "${{ github.workspace }}/.specgate-verdict.json" || true
            else
              echo "- Specgate verdict artifact was not produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Specgate gate
        if: always()
        run: |
          exit_code="${{ steps.check.outputs.exit_code }}"
          policy_exit_code="${{ steps.policy.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            echo "Specgate step did not report an exit code." >&2
            exit 1
          fi

          if [ -n "$policy_exit_code" ] && [ "$policy_exit_code" -ne 0 ]; then
            exit "$policy_exit_code"
          fi

          if [ "$exit_code" -ne 0 ]; then
            exit "$exit_code"
          fi
